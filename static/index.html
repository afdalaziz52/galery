<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>My Gallery</title>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <header class="bg-blue-600 text-white p-4 shadow-lg">
      <div class="container mx-auto">
        <h1 class="text-3xl font-bold">My Gallery</h1>
        <p class="text-blue-200">Upload and view your images</p>
      </div>
    </header>
    <main class="container mx-auto p-4">
      <section id="upload-section" class="mb-8 bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-semibold mb-4">Upload Image</h2>
        <form id="uploadForm" enctype="multipart/form-data">
          <div class="mb-4">
            <label for="image" class="block text-sm font-medium text-gray-700 mb-2">Choose an image:</label>
            <input type="file" name="image" id="image" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required />
          </div>
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Upload</button>
        </form>
        <div id="uploadStatus" class="mt-4"></div>
      </section>

      <section id="gallery-section" class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-semibold mb-4">Gallery</h2>
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <!-- Images will be loaded here -->
        </div>
      </section>
    </main>
    <footer class="bg-gray-800 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p>&copy; 2026 My Gallery. All rights reserved.</p>
      </div>
    </footer>

    <!-- Modal for image preview -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
      <div class="bg-white p-4 rounded-lg max-w-3xl max-h-full overflow-auto">
        <img id="modalImage" src="" alt="" class="max-w-full h-auto" />
        <button id="closeModal" class="mt-4 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Close</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
